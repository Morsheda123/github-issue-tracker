<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>GitHub Issues Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white w-[420px] p-8 rounded-xl shadow-lg">

        <div class="text-center mb-6">

            <img src="assets/github-logo.png" class="w-16 mx-auto mb-3">

            <h1 class="text-xl font-semibold text-gray-800">GitHub Issues Tracker</h1>

            <p class="text-sm text-gray-500">Sign in to manage your issues</p>

        </div>

    <div class="mb-4">

        <label class="text-sm text-gray-700">Username</label>

        <input id="username" type="text" placeholder="Enter Username"
        class="w-full mt-1 border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500">

        <p class="text-sm text-indigo-600 mt-1">Default: admin</p>

    </div>

    <div class="mb-4">

        <label class="text-sm text-gray-700">Password</label>

        <input id="password" type="password" placeholder="Enter Password"
        class="w-full mt-1 border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500">

        <p class="text-sm text-indigo-600 mt-1">Default: admin123</p>

    </div>

        <button onclick="login()"
        class="w-full py-2 mt-3 text-white rounded-md bg-gradient-to-r from-purple-600 to-indigo-600">
        Sign In
        </button>

        <div class="flex items-center gap-3 my-6 text-gray-400">

            
        </div>


    </div>

<script src="js/login.js"></script>

</body>
</html>
